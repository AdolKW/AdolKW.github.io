<!DOCTYPE html>
<html>

<head>
    <title>电脑管理习惯</title>
    <link rel="stylesheet" href="/css/global.css">
    <style>
        #title {
            text-align: center;
            margin-bottom: 25px;
        }

        .highlight {
            color: Blue;
            user-select: none;
        }

        .highlight:hover {
            cursor: pointer;
        }

        p {
            white-space: pre-wrap;
            font-size: 20px;
        }

        #all-in {
            bottom: 30vh;
        }
    </style>
</head>

<body>
    <script src="../js/main.js"></script>
    <div class="base-container wrapper">
        <h1 id="title">电脑管理习惯</h1>
    </div>
    <div id="all-in" class="float-btn"><span>展开/折叠全部</span></div>
    <script>
        const base = document.querySelector('.base-container.wrapper')
        const habit = [{
            name: '电脑常用软件',
            content: `7zip        //解压
anaconda        //python虚拟环境
Android Studio      //安卓开发
ArcGis      //地理地图数据处理
ArcGis Pro      //加强版
aseprite        //画像素画
AU      //视频处理
CAD     //矢量设计
AutoDarkMode        //自动夜间模式
百度网盘        //文件传输
ContextMenuManage       //右键管理
CrystalDiskInfo     //硬盘信息查询
DOSBox      //dos环境模拟
eclipse     //javaIDE
Epic        //游戏下载
eudic       //小窗翻译查词
everything      //快搜电脑文件
FLStudio20      //编曲作曲
geek        //软件卸载
GeoServer       //地理服务器
Git     //代码管理
火绒        //顶替windows defend
idea        //javaIDE
PyCharm     //pythonIDE
雷电模拟器      //安卓模拟器
MATLAB      //科学计算
mingw64     //c/c++环境
鼠大侠      //鼠标连点器
nodejs      //js包管理器
PS      //图片处理
PotPlayer       //视频播放器
PR      //视频剪辑
PXCook      //像素处理
QQ      //聊天
QQ音乐      //听歌
夸克        //浏览器
SDKDNS      //代码管理
搜狗输入法      //输入法
Steam       //游戏下载
微信        //聊天
Unity       //游戏引擎
VSCode      //代码编辑
wegame      //游戏下载
winmerge        //文件差异分析
搜图神器        //搜图神器
图吧工具箱      //电脑工具合集
迅雷        //文件传输
Vocaloid4fe     //调音
utau        //调音
Twinkle Tray        //调节亮度
TranslucentTB       //状态栏美化
office tool plus        //安装office`
        },
        {
            name:'文件夹命名习惯',
            content:`1.C盘下创建'AAAPAN'
2.C盘下的'AAAPAN'与其他磁盘根目录，如D、E盘等，创建以下文件夹
    (1) Download    //各种软件的下载路径
    (2) Sw    //存放软件
    (3) File    //存放各种文件，内部有详细分类
    (4) Game    //存放各种游戏,内部有详细分类
    (5) Project    //存放各种工程项目，如代码，视频剪辑
    (6) Study    //存放学习资料
    (7) Tool    //存放各种独立工具
3.上述2中描述的文件夹的子文件夹遵循以下规则:
    (1) 安装软件时更改路径为'C:\\AAAPAN\\Sw\\xxx'时，不对xxx进行更改
    (2) 单机游戏或gal文件夹的名称尽量以英文名称或汉语拼音加数字、字母后缀命名
        汉字长度在4及以内为大驼峰命名法,如，KongZhiGuiJiFc代表空之轨迹FC
        汉字长度超过4则以小写串式命名法，如，kong-zhi-gui-ji-fc代表空之轨迹fc。`
        }
        ]

        function ReplaceBracket(str) {
            str = str.replace(/</g, "\&lt")
            str = str.replace(/>/g, "\&gt")
            return str;
        }

        base.innerHTML += habit.map((m) => {
            m.content = ReplaceBracket(m.content)
            return `
				<h1>${m.name}</h1>
				<details>
					<summary class="highlight">展开/收起</summary>
					<p>${m.content}</p>
				</details>`
        }).join('')

        const allIn = document.getElementById('all-in')
        allIn.addEventListener('click', UnfoldOrFold)
        function UnfoldOrFold() {
            const details = document.getElementsByTagName('details')
            const detailsArray = Array.from(details);
            const isAllOpen = detailsArray.every(detail => detail.open);
            if (isAllOpen) {
                detailsArray.forEach(detail => detail.open = false)
            } else {
                detailsArray.forEach(detail => detail.open = true)
            }
        }
    </script>
</body>

</html>
