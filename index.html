<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <title>伊始之苏</title>
    <link rel="stylesheet" href="/css/global.css">
    <style>
        body {
            background-color: #f2f2f2;
            font-family: "Arial", sans-serif;
        }
        
        .blog-header {
            text-align: center;
            margin-top: 200px;
        }
        
        .blog-title {
            font-size: 72px;
            color: white;
            font-family: "Impact", sans-serif;
            animation: zoomInOut 3s infinite;
        }
        
        @keyframes zoomInOut {
            0% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.2);
            }
            100% {
                transform: scale(1);
            }
        }
    </style>
</head>

<body>
    <script src="./js/main.js"></script>
    <div class="blog-header">
        <h1 class="blog-title">卧槽，主页要写什么</h1>
    </div>
</body>
</html>
